<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Statistics</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="statistics-page" onload="loadUserProfile(); initStatisticsPage();">

<div class="sidebar">
  <h2>Study Planner</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="courses.html">Courses</a>
  <a href="deadlines.html">Deadlines</a>
  <a href="availability.html">Availability</a>
  <a href="statistics.html" class="active">Statistics</a>
  <a href="index.html">Log out</a>
</div>

<div class="main">
  <div class="top-user">
    <span id="userNameDisplay"></span>
    <img id="userAvatar" class="user-avatar" src="female.png" alt="User">
  </div>

  <h1>Study Statistics</h1>

  <div class="stats-container">
    <div class="stats-left">
      <table id="statsTable">
        <thead>
          <tr>
            <th>Day</th>
            <th>Hours</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="stats-right">
      <h3 class="chart-heading">Completed Sessions by Day</h3>
      <p class="chart-description">Bar length shows how many planned sessions were checked as completed.</p>
      <div id="chartContainer"></div>
    </div>
  </div>

  <p class="stats-note">Weekly Study Performance Summary</p>

  <div class="stats-cards">
    <div class="stat-card">
      <div class="number" id="totalHours">0</div>
      <div class="label">Total Hours</div>
    </div>
    <div class="stat-card completed">
      <div class="number" id="completedSessions">0</div>
      <div class="label">Completed</div>
    </div>
    <div class="stat-card missed">
      <div class="number" id="missedSessions">0</div>
      <div class="label">Missed</div>
    </div>
  </div>
</div>

<script src="script.js"></script>

<script>
const statsDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function getCompleted(){
  try{
    return JSON.parse(localStorage.getItem("ssp_completedTasks") || "{}");
  }catch(e){
    return {};
  }
}

function getPlanData(){
  return buildWeeklyPlan();
}

function getSessionId(day, index, item){
  return `merged-${day}-${index}-${item.course}-${item.title}`;
}

function countCompleted(items, completed, day){
  return items.reduce((count, item, index) => {
    const sessionId = getSessionId(day, index, item);
    return count + (completed[sessionId] ? 1 : 0);
  }, 0);
}

function renderTable(){
  const tbody = document.querySelector("#statsTable tbody");
  const completed = getCompleted();
  const {plan, availability} = getPlanData();
  tbody.innerHTML = "";

  statsDays.forEach(day => {
    const availableHours = Number(availability[day] || 0);
    const items = plan[day] || [];
    const done = countCompleted(items, completed, day);
    let status;

    if(items.length === 0){
      status = availableHours > 0
        ? '<span class="status-neutral">No Sessions</span>'
        : '<span>—</span>';
    }
    else if(done === items.length){
      status = '<span class="status-completed">✓ Completed</span>';
    }
    else{
      status = `<span class="status-missed">✗ Missed (${items.length - done})</span>`;
    }

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${day}</td>
      <td>${items.length}</td>
      <td>${status}</td>
    `;
    tbody.appendChild(row);
  });
}

function renderBars(){
  const container = document.getElementById("chartContainer");
  const completed = getCompleted();
  const {plan} = getPlanData();
  container.innerHTML = "";

  const max = Math.max(...statsDays.map(day => (plan[day] || []).length), 1);

  statsDays.forEach(day => {
    const items = plan[day] || [];
    const done = countCompleted(items, completed, day);
    const width = items.length > 0 ? (done / max) * 100 : 0;
    const label = items.length > 0 ? `${done}/${items.length} done` : "No Sessions";

    const row = document.createElement("div");
    row.classList.add("bar-row");
    row.innerHTML = `
      <span class="day-name">${day}</span>
      <div class="bar" style="width:${width}%">${label}</div>
    `;
    container.appendChild(row);
  });
}

function renderCards(){
  const completed = getCompleted();
  const {plan} = getPlanData();
  let total = 0;
  let done = 0;
  let missed = 0;

  statsDays.forEach(day => {
    const items = plan[day] || [];
    const completedToday = countCompleted(items, completed, day);
    total += items.length;
    done += completedToday;
    missed += Math.max(items.length - completedToday, 0);
  });

  document.getElementById("totalHours").innerText = total + "h";
  document.getElementById("completedSessions").innerText = done;
  document.getElementById("missedSessions").innerText = missed;
}

function initStatisticsPage(){
  renderTable();
  renderBars();
  renderCards();
}
</script>

</body>
</html>
